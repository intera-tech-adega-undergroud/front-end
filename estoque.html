<!DOCTYPE html>
<html lang="pt-br">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Adega Underground - Estoque</title>

<link rel="stylesheet" href="estoque.css">

</head>

<body>

<h1>Produtos</h1>

<div class="top-bar">

<input
type="text"
id="buscar_produto"
placeholder="Buscar por nome do produto..."
oninput="buscar()"
>

<button class="btn-adicionar" onclick="abrirModalAdicionar()">
+ Adicionar produto
</button>

</div>


<table>

<thead>

<tr>
<th>Produto</th>
<th>Estoque</th>
<th>Preço de custo</th>
<th>Preço de venda</th>
<th>Ações</th>
</tr>

</thead>

<tbody id="tabela_produtos"></tbody>

</table>


<div id="mensagem"></div>


<!-- MODAL EDITAR -->

<div id="modalEditar" class="modal">

<div class="modal-content">

<h3>Editar Produto</h3>

<label>Nome</label>
<input type="text" id="editar_nome">

<label>Estoque</label>
<input type="number" id="editar_estoque">

<label>Preço de custo</label>
<input type="number" id="editar_custo">

<label>Preço de venda</label>
<input type="number" id="editar_preco">

<div class="modal-buttons">

<button onclick="fecharModalEditar()">Cancelar</button>

<button class="btn-salvar" onclick="salvar()">Salvar</button>

</div>

</div>

</div>


<!-- MODAL ADICIONAR -->

<div id="modalAdicionar" class="modal">

<div class="modal-content">

<h3>Novo Produto</h3>

<label>Nome</label>
<input type="text" id="add_nome">

<label>Estoque</label>
<input type="number" id="add_estoque">

<label>Preço de custo</label>
<input type="number" id="add_custo">

<label>Preço de venda</label>
<input type="number" id="add_preco">

<div class="modal-buttons">

<button onclick="fecharModalAdicionar()">Cancelar</button>

<button class="btn-salvar" onclick="adicionar()">Adicionar</button>

</div>

</div>

</div>


<script type="module">

import { verificarLogin, obterUsuarioLogado } from "./utils.js";

verificarLogin();

const usuario = obterUsuarioLogado();

if(usuario){
console.log(usuario.email)
}

let produtoSelecionado = null


async function exibir(){

const resposta = await fetch("http://localhost:8080/produtos")

const dados = await resposta.json()

renderizarTabela(dados)

}


function renderizarTabela(produtos){

tabela_produtos.innerHTML = ""

produtos.forEach(item => {

tabela_produtos.innerHTML += `

<tr>

<td>${item.nome}</td>

<td>${item.estoque}</td>

<td>R$ ${item.custo}</td>

<td>R$ ${item.preco}</td>

<td>

<button onclick="abrirModalEditar(${item.id})">✏️</button>

<button onclick="excluir(${item.id})">🗑</button>

</td>

</tr>

`

})

}


async function buscar(){

const texto = buscar_produto.value.toLowerCase()

const resposta = await fetch("http://localhost:8080/produtos")

const produtos = await resposta.json()

const filtrados = produtos.filter(p =>
p.nome.toLowerCase().includes(texto)
)

renderizarTabela(filtrados)

}


async function abrirModalEditar(id){

const resposta = await fetch(`http://localhost:8080/produtos/${id}`)

const produto = await resposta.json()

produtoSelecionado = id

editar_nome.value = produto.nome
editar_estoque.value = produto.estoque
editar_custo.value = produto.custo
editar_preco.value = produto.preco

modalEditar.style.display = "flex"

}


function fecharModalEditar(){

modalEditar.style.display = "none"

}


async function salvar(){

const resposta = await fetch(

`http://localhost:8080/produtos/${produtoSelecionado}`,

{
method:"PATCH",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({

nome: editar_nome.value,
estoque: Number(editar_estoque.value),
custo: Number(editar_custo.value),
preco: Number(editar_preco.value)

})

}

)

if(resposta.ok){

fecharModalEditar()

exibir()

mensagem.innerHTML = "Produto atualizado!"

}

}


async function excluir(id){

const resposta = await fetch(

`http://localhost:8080/produtos/${id}`,

{
method:"DELETE"
}

)

if(resposta.ok){

exibir()

mensagem.innerHTML = "Produto excluído!"

}

}


function abrirModalAdicionar(){

modalAdicionar.style.display = "flex"

}


function fecharModalAdicionar(){

modalAdicionar.style.display = "none"

}


async function adicionar(){

const resposta = await fetch(

"http://localhost:8080/produtos",

{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({

nome:add_nome.value,
estoque:Number(add_estoque.value),
custo:Number(add_custo.value),
preco:Number(add_preco.value)

})

}

)

if(resposta.ok){

fecharModalAdicionar()

exibir()

mensagem.innerHTML="Produto adicionado!"

}

}


window.exibir = exibir
window.buscar = buscar
window.abrirModalEditar = abrirModalEditar
window.fecharModalEditar = fecharModalEditar
window.salvar = salvar
window.excluir = excluir
window.abrirModalAdicionar = abrirModalAdicionar
window.fecharModalAdicionar = fecharModalAdicionar
window.adicionar = adicionar

exibir()

</script>

</body>
</html>
