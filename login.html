<!DOCTYPE html>
<html lang="pt-br">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Adega Underground - Login</title>

<link rel="stylesheet" href="login.css">

</head>

<body>

<div class="container">

<div class="login-card">

<h1>Adega Underground</h1>

<p class="subtitulo">Acesse sua conta</p>

<label>Email</label>
<input type="text" id="input_email" placeholder="Digite seu email">

<label>Senha</label>
<input type="password" id="input_senha" placeholder="Digite sua senha" autocomplete="off">

<button onclick="entrar()" class="btn-login">Entrar</button>

<div id="mensagem"></div>

</div>

</div>


<script type="module">

import { validarEmail, validarSenha, salvarUsuario } from "./utils.js";

async function entrar() {

const email = document.getElementById("input_email").value;
const senha = document.getElementById("input_senha").value;
const mensagem = document.getElementById("mensagem");

if (!validarEmail(email)) {
mensagem.innerHTML = "Email inválido!";
return;
}

if (!validarSenha(senha)) {
mensagem.innerHTML = "A senha deve ter no mínimo 8 caracteres e conter pelo menos um caractere especial!";
return;
}

mensagem.innerHTML = "Verificando acesso...";

try {

const resposta = await fetch(`http://localhost:8080/acessos?email=${email}&senha=${senha}`);

const dados = await resposta.json();

if (dados.length > 0) {

mensagem.innerHTML = "Login realizado com sucesso!";

salvarUsuario(dados[0]);

window.location.href = "estoque.html";

} else {

mensagem.innerHTML = "Email ou senha incorretos!";

}

} catch (erro) {

mensagem.innerHTML = "Erro ao conectar com o servidor.";

}

}

window.entrar = entrar;

</script>

</body>
</html>
